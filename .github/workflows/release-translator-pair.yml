name: Release Translator Pair

on:
  schedule:
    # Runs every 30 minutes — change to your preferred interval:
    #   Every 30 min:  */30 * * * *
    #   Every hour:    0 * * * *
    #   Every 2 hours: 0 */2 * * *
    - cron: '*/30 * * * *'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      pairs_count:
        description: 'Number of pairs to release'
        required: false
        default: '1'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run release script
        id: release
        run: |
          COUNT="${{ github.event.inputs.pairs_count || '1' }}"
          node scripts/release-pair.mjs "$COUNT"
          echo "done=true" >> $GITHUB_OUTPUT

      - name: Check if files changed
        id: changes
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/translator-feed.json src/data/translator-queue.ts
          git commit -m "chore: release translator pair [skip ci]"
          git push

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "Queue is empty — nothing to commit."
